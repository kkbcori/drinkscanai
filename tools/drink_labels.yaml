# DrinkScanAI — drink label configuration
# Adapted from StowBuddy pipeline (same format, same sources)
#
# Open Images V7 class browser:
# https://storage.googleapis.com/openimages/v7/oidv7-class-descriptions.csv
#
# Key drink classes available in Open Images V7:
#   Coffee cup, Beer, Wine glass, Juice, Cocktail, Soft drink,
#   Milk, Tea, Coffee, Smoothie, Bottle, Mug, Beer glass

version: 1
format: stowbuddy-labels-v1

labels:

