name: Generate Distribution Certificate (run once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Generate certificate via Ruby + Apple API
        env:
          APP_STORE_CONNECT_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          gem install jwt --quiet

          ruby << 'RUBY'
          require 'base64'
          require 'json'
          require 'net/http'
          require 'uri'
          require 'openssl'
          require 'jwt'
          require 'time'

          # Decode API key
          key_content = Base64.decode64(ENV['APP_STORE_CONNECT_KEY_BASE64'])
          File.write('/tmp/AuthKey.p8', key_content)

          # Generate JWT
          private_key = OpenSSL::PKey::EC.new(key_content)
          payload = {
            iss: ENV['APP_STORE_CONNECT_ISSUER_ID'],
            iat: Time.now.to_i,
            exp: Time.now.to_i + 1200,
            aud: 'appstoreconnect-v1'
          }
          token = JWT.encode(payload, private_key, 'ES256', { kid: ENV['APP_STORE_CONNECT_KEY_ID'] })
          puts "JWT generated successfully"

          # Generate RSA key pair for certificate
          rsa_key = OpenSSL::PKey::RSA.new(2048)
          File.write('/tmp/dist_key.pem', rsa_key.to_pem)

          # Generate CSR
          csr = OpenSSL::X509::Request.new
          csr.version = 0
          csr.subject = OpenSSL::X509::Name.parse('/CN=Apple Distribution/O=DrinkScanAI/C=US')
          csr.public_key = rsa_key.public_key
          csr.sign(rsa_key, OpenSSL::Digest::SHA256.new)
          csr_base64 = Base64.strict_encode64(csr.to_der)
          puts "CSR generated"

          # Submit to Apple API
          uri = URI('https://api.appstoreconnect.apple.com/v1/certificates')
          http = Net::HTTP.new(uri.host, uri.port)
          http.use_ssl = true
          req = Net::HTTP::Post.new(uri)
          req['Authorization'] = "Bearer #{token}"
          req['Content-Type'] = 'application/json'
          req.body = {
            data: {
              type: 'certificates',
              attributes: {
                certificateType: 'IOS_DISTRIBUTION',
                csrContent: csr_base64
              }
            }
          }.to_json

          response = http.request(req)
          data = JSON.parse(response.body)

          if data['errors']
            puts "API ERROR: #{data['errors']}"
            exit 1
          end

          cert_content = data['data']['attributes']['certificateContent']
          puts "Certificate received from Apple"

          # Decode certificate
          cert_der = Base64.decode64(cert_content)
          cert = OpenSSL::X509::Certificate.new(cert_der)
          File.write('/tmp/dist.pem', cert.to_pem)

          # Create .p12
          password = 'DrinkScanAI2025!'
          p12 = OpenSSL::PKCS12.create(password, 'Distribution', rsa_key, cert)
          File.write('/tmp/distribution.p12', p12.to_der)
          puts "p12 created successfully"

          # Output base64
          b64 = Base64.strict_encode64(File.read('/tmp/distribution.p12'))
          puts ""
          puts "============================================"
          puts "Copy the value below into GitHub Secrets"
          puts "============================================"
          puts ""
          puts "Secret name:  CERTIFICATE_BASE64"
          puts "Secret value:"
          puts b64
          puts ""
          puts "Secret name:  CERTIFICATE_PASSWORD"
          puts "Secret value: #{password}"
          puts "============================================"
          RUBY

      - name: Upload .p12 as artifact
        uses: actions/upload-artifact@v4
        with:
          name: distribution-p12
          path: /tmp/distribution.p12
          retention-days: 1
