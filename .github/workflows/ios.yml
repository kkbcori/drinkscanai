name: iOS — Build & TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build iOS & Upload to TestFlight
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-cache
        with:
          path: node_modules
          key: node-${{ hashFiles('package.json') }}
          restore-keys: node-

      - name: Install JS dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      # Cache key includes Podfile hash so any Podfile change triggers fresh install
      - name: Cache CocoaPods
        uses: actions/cache@v4
        id: pods-cache
        with:
          path: ios/Pods
          key: pods-v2-${{ hashFiles('ios/Podfile') }}
          restore-keys: pods-v2-

      - name: Decode distribution certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | tr -d ' \n\r\t' | base64 --decode > distribution.p12
          file distribution.p12
          # Import into login keychain so codesign can access without prompts
          security unlock-keychain -p "" ~/Library/Keychains/login.keychain-db || true
          security import distribution.p12 -k ~/Library/Keychains/login.keychain-db -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security 2>&1 || true
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" ~/Library/Keychains/login.keychain-db || true
          echo "=== Certificate in login keychain ==="
          security find-identity -v -p codesigning ~/Library/Keychains/login.keychain-db

      - name: Verify certificate password
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          echo "Password length: ${#CERTIFICATE_PASSWORD}"
          openssl pkcs12 -in distribution.p12 \
            -passin env:CERTIFICATE_PASSWORD \
            -nokeys -noout -legacy 2>&1 \
            && echo "✓ Password OK" \
            || openssl pkcs12 -in distribution.p12 \
              -passin env:CERTIFICATE_PASSWORD \
              -nokeys -noout 2>&1 \
              && echo "✓ Password OK (modern)" \
              || echo "✗ Password WRONG"

      - name: Decode provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROVISIONING_PROFILE_BASE64" | tr -d ' \n\r\t' | base64 --decode > DrinkScan_Distribution.mobileprovision

      # Only run pod install if cache missed or Podfile changed
      - name: Install CocoaPods dependencies
        if: steps.pods-cache.outputs.cache-hit != 'true'
        run: cd ios && bundle exec pod install && cd ..

      - name: Build and upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID:               ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:            ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64:           ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          CERTIFICATE_PASSWORD:                   ${{ secrets.CERTIFICATE_PASSWORD }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT:  "120"
        run: bundle exec fastlane beta

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ~/Library/Logs/gym/
            ./build/*.log
          retention-days: 5
