name: iOS — Build & TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build iOS & Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-cache
        with:
          path: node_modules
          key: node-macos15-${{ hashFiles('package.json') }}
          restore-keys: node-macos15-

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        id: pods-cache
        with:
          path: ios/Pods
          key: pods-macos15-${{ hashFiles('ios/Podfile') }}

      - name: Install CocoaPods
        run: cd ios && bundle exec pod install && cd ..

      - name: Generate app icons
        run: |
          # Create a simple blue placeholder icon using sips (built-in macOS tool)
          mkdir -p ios/DrinkScanAI/Images.xcassets/AppIcon.appiconset

          # Create a 1024x1024 base icon (solid blue with text)
          python3 -c "
          import struct, zlib

          def make_png(size, r, g, b):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              raw = b''
              for y in range(size):
                  raw += b'\x00'
                  for x in range(size):
                      raw += bytes([r, g, b, 255])
              compressed = zlib.compress(raw)
              ihdr = struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', compressed) + chunk(b'IEND', b'')

          with open('/tmp/icon_1024.png', 'wb') as f:
              f.write(make_png(1024, 0, 122, 255))
          print('Base icon created')
          "

          # Generate all required sizes using sips
          for size in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
            sips -z $size $size /tmp/icon_1024.png --out "ios/DrinkScanAI/Images.xcassets/AppIcon.appiconset/icon_${size}.png" 2>/dev/null
          done

          # Write Contents.json
          cat > ios/DrinkScanAI/Images.xcassets/AppIcon.appiconset/Contents.json << 'JSONEOF'
          {
            "images": [
              {"idiom":"iphone","scale":"2x","size":"20x20","filename":"icon_40.png"},
              {"idiom":"iphone","scale":"3x","size":"20x20","filename":"icon_60.png"},
              {"idiom":"iphone","scale":"2x","size":"29x29","filename":"icon_58.png"},
              {"idiom":"iphone","scale":"3x","size":"29x29","filename":"icon_87.png"},
              {"idiom":"iphone","scale":"2x","size":"40x40","filename":"icon_80.png"},
              {"idiom":"iphone","scale":"3x","size":"40x40","filename":"icon_120.png"},
              {"idiom":"iphone","scale":"2x","size":"60x60","filename":"icon_120.png"},
              {"idiom":"iphone","scale":"3x","size":"60x60","filename":"icon_180.png"},
              {"idiom":"ipad","scale":"1x","size":"20x20","filename":"icon_20.png"},
              {"idiom":"ipad","scale":"2x","size":"20x20","filename":"icon_40.png"},
              {"idiom":"ipad","scale":"1x","size":"29x29","filename":"icon_29.png"},
              {"idiom":"ipad","scale":"2x","size":"29x29","filename":"icon_58.png"},
              {"idiom":"ipad","scale":"1x","size":"40x40","filename":"icon_40.png"},
              {"idiom":"ipad","scale":"2x","size":"40x40","filename":"icon_80.png"},
              {"idiom":"ipad","scale":"1x","size":"76x76","filename":"icon_76.png"},
              {"idiom":"ipad","scale":"2x","size":"76x76","filename":"icon_152.png"},
              {"idiom":"ipad","scale":"2x","size":"83.5x83.5","filename":"icon_167.png"},
              {"idiom":"ios-marketing","scale":"1x","size":"1024x1024","filename":"icon_1024.png"}
            ],
            "info":{"author":"xcode","version":1}
          }
          JSONEOF
          echo "Icons generated successfully"

      # Create keychain with KNOWN password, import cert, pre-authorize codesign
      # This bypasses setup_ci which uses a random password we can never know
      - name: Setup keychain and import certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD="signing_keychain_password"

          # Create fresh keychain with known password
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_BASE64" | tr -d ' \n\r\t' | base64 --decode > /tmp/dist.p12
          security import /tmp/dist.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Pre-authorize codesign — prevents the export hang
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Add to keychain search list
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Verify
          echo "=== Certificate in keychain ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # Export path for Fastlane
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Decode provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROVISIONING_PROFILE_BASE64" | tr -d ' \n\r\t' | base64 --decode > DrinkScan_Distribution.mobileprovision

      - name: Build and upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID:              ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:           ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64:          ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          CERTIFICATE_PASSWORD:                  ${{ secrets.CERTIFICATE_PASSWORD }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
        run: bundle exec fastlane beta

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ~/Library/Logs/gym/
            ./build/*.log
          retention-days: 5
