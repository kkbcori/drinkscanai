name: Convert to CoreML

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install "torch==2.4.0" "torchvision==0.19.0" --index-url https://download.pytorch.org/whl/cpu
          pip install "coremltools==8.1" "timm==0.9.16" "numpy<2" "Pillow"

      - name: Build and convert model
        run: python3 scripts/build_coreml.py

      - name: Commit model to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ios/DrinkScanAI/ML/DrinkClassifier.mlpackage
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: add CoreML drink classifier (auto-generated)"
            git push
          fi
